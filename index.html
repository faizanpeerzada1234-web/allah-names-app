<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>99 Names of Allah</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #111;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    /* Sidebar */
    #sidebar {
        position: fixed;
        top: 0;
        left: -260px;
        width: 260px;
        height: 100%;
        background-color: #222;
        overflow-y: auto;
        transition: 0.3s;
        padding-top: 20px;
        z-index: 1000;
    }
    #sidebar.show {
        left: 0;
    }
    #sidebar button {
        display: block;
        width: 90%;
        margin: 10px auto;
        font-size: 18px;
        padding: 8px 10px;
        background: #00c896;
        border: none;
        color: black;
        cursor: pointer;
        border-radius: 5px;
        z-index: 1001;
    }
    #sidebar ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    #sidebar li {
        padding: 10px;
        border-bottom: 1px solid #444;
        cursor: pointer;
        text-align: center;
    }
    #sidebar li:hover {
        background-color: #00c896;
        color: black;
    }

    /* Menu button */
    .menu-btn {
        position: fixed;
        top: 10px;
        left: 10px;
        font-size: 24px;
        padding: 8px 12px;
        background: #00c896;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        z-index: 1100;
        color: black;
    }

    /* Name display */
    #name-display {
        text-align: center;
        margin: 0 20px;
    }
    #name-display #name {
        font-size: 40px;
        font-weight: bold;
    }
    #name-display #meaning {
        font-size: 20px;
        margin-top: 10px;
        color: #ccc;
    }

    /* Navigation buttons */
    .nav-btns {
        margin-top: 30px;
    }
    .nav-btns button {
        font-size: 20px;
        padding: 10px 20px;
        margin: 0 10px;
        background-color: #00c896;
        color: black;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    @media (max-width: 500px) {
        #name-display #name {
            font-size: 28px;
        }
        #name-display #meaning {
            font-size: 16px;
        }
        .nav-btns button {
            font-size: 16px;
            padding: 8px 15px;
            margin: 0 5px;
        }
    }
</style>
</head>
<body>

<button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>

<div id="sidebar">
    <button onclick="toggleMenu()">× Close</button>
    <ul id="name-list">
        <!-- List will be dynamically generated -->
    </ul>
</div>

<div id="name-display">
    <div id="name">Loading...</div>
    <div id="meaning"></div>
</div>

<div class="nav-btns">
    <button onclick="prevName()">Previous</button>
    <button onclick="nextName()">Next</button>
</div>

<script>
    const names = [
        {name: "Allah", meaning: "The God, The Only One Worthy of Worship"},
        {name: "Ar-Rahman", meaning: "The Most Gracious"},
        {name: "Ar-Rahim", meaning: "The Most Merciful"},
        {name: "Al-Malik", meaning: "The King, The Sovereign"},
        {name: "Al-Quddus", meaning: "The Pure, The Holy"},
        {name: "As-Salam", meaning: "The Source of Peace"},
        {name: "Al-Mu’min", meaning: "The Granter of Security"},
        {name: "Al-Muhaymin", meaning: "The Protector"},
        {name: "Al-Aziz", meaning: "The Mighty"},
        {name: "Al-Jabbar", meaning: "The Compeller"},
        {name: "Al-Mutakabbir", meaning: "The Supreme, The Majestic"},
        {name: "Al-Khaliq", meaning: "The Creator"},
        {name: "Al-Bari", meaning: "The Evolver"},
        {name: "Al-Musawwir", meaning: "The Fashioner"},
        {name: "Al-Ghaffar", meaning: "The Forgiving"},
        {name: "Al-Qahhar", meaning: "The All-Prevailing One"},
        {name: "Al-Wahhab", meaning: "The Bestower"},
        {name: "Ar-Razzaq", meaning: "The Provider"},
        {name: "Al-Fattah", meaning: "The Opener"},
        {name: "Al-‘Alim", meaning: "The All-Knowing"},
        {name: "Al-Qabid", meaning: "The Constrictor"},
        {name: "Al-Basit", meaning: "The Expander"},
        {name: "Al-Khafid", meaning: "The Abaser"},
        {name: "Ar-Rafi", meaning: "The Exalter"},
        {name: "Al-Mu’izz", meaning: "The Bestower of Honor"},
        {name: "Al-Mudhill", meaning: "The Humiliator"},
        {name: "As-Sami", meaning: "The All-Hearing"},
        {name: "Al-Basir", meaning: "The All-Seeing"},
        {name: "Al-Hakam", meaning: "The Judge"},
        {name: "Al-‘Adl", meaning: "The Just"},
        {name: "Al-Latif", meaning: "The Subtle One"},
        {name: "Al-Khabir", meaning: "The All-Aware"},
        {name: "Al-Halim", meaning: "The Forbearing"},
        {name: "Al-Azim", meaning: "The Magnificent"},
        {name: "Al-Ghafur", meaning: "The All-Forgiving"},
        {name: "Ash-Shakur", meaning: "The Most Appreciative"},
        {name: "Al-Ali", meaning: "The Most High"},
        {name: "Al-Kabir", meaning: "The Most Great"},
        {name: "Al-Hafiz", meaning: "The Preserver"},
        {name: "Al-Muqit", meaning: "The Sustainer"},
        {name: "Al-Hasib", meaning: "The Reckoner"},
        {name: "Al-Jalil", meaning: "The Majestic"},
        {name: "Al-Karim", meaning: "The Most Generous"},
        {name: "Ar-Raqib", meaning: "The Watchful"},
        {name: "Al-Mujib", meaning: "The Responsive One"},
        {name: "Al-Wasi", meaning: "The All-Encompassing"},
        {name: "Al-Hakim", meaning: "The All-Wise"},
        {name: "Al-Wadud", meaning: "The Loving"},
        {name: "Al-Majid", meaning: "The Most Glorious"},
        {name: "Al-Ba’ith", meaning: "The Resurrector"},
        {name: "Ash-Shahid", meaning: "The Witness"},
        {name: "Al-Haqq", meaning: "The Truth"},
        {name: "Al-Wakil", meaning: "The Trustee"},
        {name: "Al-Qawi", meaning: "The Strong"},
        {name: "Al-Matin", meaning: "The Firm, The Steadfast"},
        {name: "Al-Wali", meaning: "The Protecting Friend"},
        {name: "Al-Hamid", meaning: "The Praiseworthy"},
        {name: "Al-Muhsi", meaning: "The Reckoner"},
        {name: "Al-Mubdi", meaning: "The Originator"},
        {name: "Al-Mu’id", meaning: "The Restorer"},
        {name: "Al-Muhyi", meaning: "The Giver of Life"},
        {name: "Al-Mumit", meaning: "The Taker of Life"},
        {name: "Al-Hayy", meaning: "The Ever-Living"},
        {name: "Al-Qayyum", meaning: "The Self-Subsisting"},
        {name: "Al-Wajid", meaning: "The Finder"},
        {name: "Al-Majid", meaning: "The Noble, The Glorious"},
        {name: "Al-Wahid", meaning: "The One"},
        {name: "Al-Ahad", meaning: "The Unique, The Only One"},
        {name: "As-Samad", meaning: "The Eternal, Absolute"},
        {name: "Al-Qadir", meaning: "The All-Powerful"},
        {name: "Al-Muqtadir", meaning: "The Creator of All Power"},
        {name: "Al-Muqaddim", meaning: "The Expediter"},
        {name: "Al-Mu’akhkhir", meaning: "The Delayer"},
        {name: "Al-Awwal", meaning: "The First"},
        {name: "Al-Akhir", meaning: "The Last"},
        {name: "Az-Zahir", meaning: "The Manifest"},
        {name: "Al-Batin", meaning: "The Hidden"},
        {name: "Al-Wali", meaning: "The Governor"),
        {name: "Al-Muta’ali", meaning: "The Most Exalted"},
        {name: "Al-Barr", meaning: "The Source of All Goodness"},
        {name: "At-Tawwab", meaning: "The Acceptor of Repentance"},
        {name: "Al-Muntaqim", meaning: "The Avenger"},
        {name: "Al-‘Afuww", meaning: "The Pardoner"},
        {name: "Ar-Ra’uf", meaning: "The Most Kind"),
        {name: "Malik-ul-Mulk", meaning: "The Owner of All"},
        {name: "Dhul-Jalal wal-Ikram", meaning: "The Lord of Majesty and Bounty"},
        {name: "Al-Muqsit", meaning: "The Equitable"},
        {name: "Al-Jami", meaning: "The Gatherer"},
        {name: "Al-Ghani", meaning: "The Rich, Free of Need"},
        {name: "Al-Mughni", meaning: "The Enricher"},
        {name: "Al-Mani", meaning: "The Preventer"},
        {name: "Ad-Darr", meaning: "The Distresser"},
        {name: "An-Nafi", meaning: "The Benefactor"},
        {name: "An-Nur", meaning: "The Light"},
        {name: "Al-Hadi", meaning: "The Guide"},
        {name: "Al-Badi", meaning: "The Incomparable"},
        {name: "Al-Baqi", meaning: "The Everlasting"},
        {name: "Al-Warith", meaning: "The Inheritor"},
        {name: "Ar-Rashid", meaning: "The Guide to the Right Path"},
        {name: "As-Sabur", meaning: "The Patient"}
    ];

    let currentIndex = 0;

    function showName(index) {
        document.getElementById("name").innerText = names[index].name;
        document.getElementById("meaning").innerText = names[index].meaning;
        highlightSidebar(index);
    }

    function nextName() {
        currentIndex = (currentIndex + 1) % names.length;
        showName(currentIndex);
    }

    function prevName() {
        currentIndex = (currentIndex - 1 + names.length) % names.length;
        showName(currentIndex);
    }

    function toggleMenu() {
        document.getElementById("sidebar").classList.toggle("show");
    }

    function highlightSidebar(index) {
        const items = document.querySelectorAll("#name-list li");
        items.forEach((item, i) => {
            item.style.backgroundColor = i === index ? "#00c896" : "transparent";
            item.style.color = i === index ? "black" : "white";
        });
    }

    // Populate sidebar
    const sidebarList = document.getElementById("name-list");
    names.forEach((obj, i) => {
        const li = document.createElement("li");
        li.innerText = obj.name;
        li.onclick = () => { currentIndex = i; showName(i); toggleMenu(); };
        sidebarList.appendChild(li);
    });

    // Initial display
    showName(currentIndex);
</script>
</body>
</html>
