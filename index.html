 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>99 Names of Allah</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #111; /* Dark background */
        color: #fff; /* White text */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    /* Sidebar */
    #sidebar {
        position: fixed;
        top: 0;
        left: -260px;
        width: 260px;
        height: 100%;
        background-color: #222;
        overflow-y: auto;
        transition: 0.3s;
        padding-top: 20px;
        z-index: 1000;
    }
    #sidebar.show {
        left: 0;
    }
    #sidebar button {
        display: block;
        width: 90%;
        margin: 10px auto;
        font-size: 18px;
        padding: 8px 10px;
        background: #00c896;
        border: none;
        color: black;
        cursor: pointer;
        border-radius: 5px;
        z-index: 1001;
    }
    #sidebar ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    #sidebar li {
        padding: 10px;
        border-bottom: 1px solid #444;
        cursor: pointer;
        text-align: center;
    }
    #sidebar li:hover {
        background-color: #00c896;
        color: black;
    }

    /* Menu button */
    .menu-btn {
        position: fixed;
        top: 10px;
        left: 10px;
        font-size: 24px;
        padding: 8px 12px;
        background: #00c896;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        z-index: 1100;
        color: black;
    }

    /* Name display */
    #name-display {
        font-size: 40px;
        text-align: center;
        margin: 0 20px;
        word-wrap: break-word;
    }

    /* Navigation buttons */
    .nav-btns {
        margin-top: 30px;
    }
    .nav-btns button {
        font-size: 20px;
        padding: 10px 20px;
        margin: 0 10px;
        background-color: #00c896;
        color: black;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    @media (max-width: 500px) {
        #name-display {
            font-size: 28px;
        }
        .nav-btns button {
            font-size: 16px;
            padding: 8px 15px;
            margin: 0 5px;
        }
    }
</style>
</head>
<body>

<button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>

<div id="sidebar">
    <button onclick="toggleMenu()">× Close</button>
    <ul id="name-list">
        <!-- Names will be dynamically inserted here -->
    </ul>
</div>

<div id="name-display">Loading...</div>

<div class="nav-btns">
    <button onclick="prevName()">Previous</button>
    <button onclick="nextName()">Next</button>
</div>

<script>
    const names = [
        "Allah", "Ar-Rahman", "Ar-Rahim", "Al-Malik", "Al-Quddus", "As-Salam",
        "Al-Mu’min", "Al-Muhaymin", "Al-Aziz", "Al-Jabbar", "Al-Mutakabbir",
        "Al-Khaliq", "Al-Bari", "Al-Musawwir", "Al-Ghaffar", "Al-Qahhar",
        "Al-Wahhab", "Ar-Razzaq", "Al-Fattah", "Al-‘Alim", "Al-Qabid",
        "Al-Basit", "Al-Khafid", "Ar-Rafi", "Al-Mu’izz", "Al-Mudhill",
        "As-Sami", "Al-Basir", "Al-Hakam", "Al-‘Adl", "Al-Latif", "Al-Khabir",
        "Al-Halim", "Al-Azim", "Al-Ghafur", "Ash-Shakur", "Al-Ali", "Al-Kabir",
        "Al-Hafiz", "Al-Muqit", "Al-Hasib", "Al-Jalil", "Al-Karim", "Ar-Raqib",
        "Al-Mujib", "Al-Wasi", "Al-Hakim", "Al-Wadud", "Al-Majid", "Al-Ba’ith",
        "Ash-Shahid", "Al-Haqq", "Al-Wakil", "Al-Qawi", "Al-Matin", "Al-Wali",
        "Al-Hamid", "Al-Muhsi", "Al-Mubdi", "Al-Mu’id", "Al-Muhyi", "Al-Mumit",
        "Al-Hayy", "Al-Qayyum", "Al-Wajid", "Al-Majid", "Al-Wahid", "Al-Ahad",
        "As-Samad", "Al-Qadir", "Al-Muqtadir", "Al-Muqaddim", "Al-Mu’akhkhir",
        "Al-Awwal", "Al-Akhir", "Az-Zahir", "Al-Batin", "Al-Wali", "Al-Muta’ali",
        "Al-Barr", "At-Tawwab", "Al-Muntaqim", "Al-‘Afuww", "Ar-Ra’uf", "Malik-ul-Mulk",
        "Dhul-Jalal wal-Ikram", "Al-Muqsit", "Al-Jami", "Al-Ghani", "Al-Mughni",
        "Al-Mani", "Ad-Darr", "An-Nafi", "An-Nur", "Al-Hadi", "Al-Badi", "Al-Baqi",
        "Al-Warith", "Ar-Rashid", "As-Sabur"
    ];

    let currentIndex = 0;

    function showName(index) {
        document.getElementById("name-display").innerText = names[index];
        highlightSidebar(index);
    }

    function nextName() {
        currentIndex = (currentIndex + 1) % names.length;
        showName(currentIndex);
    }

    function prevName() {
        currentIndex = (currentIndex - 1 + names.length) % names.length;
        showName(currentIndex);
    }

    function toggleMenu() {
        document.getElementById("sidebar").classList.toggle("show");
    }

    function highlightSidebar(index) {
        const items = document.querySelectorAll("#name-list li");
        items.forEach((item, i) => {
            item.style.backgroundColor = i === index ? "#00c896" : "transparent";
            item.style.color = i === index ? "black" : "white";
        });
    }

    // Populate sidebar
    const sidebarList = document.getElementById("name-list");
    names.forEach((name, i) => {
        const li = document.createElement("li");
        li.innerText = name;
        li.onclick = () => { currentIndex = i; showName(i); toggleMenu(); };
        sidebarList.appendChild(li);
    });

    // Initial display
    showName(currentIndex);
</script>
</body>
</html>
